name: IAP Review Screenshots

# Capacity-tier subscription review workflow — captures slim UITest frames
# and uploads to ASC via artemis service runner.

on:
  workflow_dispatch:
    inputs:
      devices:
        description: 'Devices to test (comma-separated, or "all")'
        required: false
        default: 'iPhone16Pro'
      dry_run:
        description: 'Dry-run mode (capture but do not upload)'
        required: false
        default: 'false'
      check_asc_state:
        description: 'Probe ASC state after upload'
        required: false
        default: 'true'

concurrency:
  group: iap-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture-iap-frames:
    name: Capture IAP review frames
    runs-on: [ self-hosted, macOS, ios-build, ARM64 ]
    timeout-minutes: 30
    strategy:
      matrix:
        device:
          - name: iPhone16Pro
            destination: "generic/platform=iOS Simulator,name=iPhone 16 Pro"
            width: 1290
            height: 2796
      max-parallel: 1

    env:
      APP_NAME: vaultyx
      BUNDLE_ID: com.katafract.vault
      SCHEME: Vaultyx
      RBENV_RUBY: /Users/christianflores/.rbenv/versions/3.3.11
      DEVICE_NAME: ${{ matrix.device.name }}
      SIMULATOR_DESTINATION: ${{ matrix.device.destination }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Load runner env
        run: |
          ENV_FILE="$HOME/runner-env/${APP_NAME}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::Missing $ENV_FILE"; exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep '=' >> "$GITHUB_ENV"

      - name: Ensure ASC private key on disk
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ ! -f "$ASC_KEY_PATH" ]; then
            if [ -n "$ASC_PRIVATE_KEY" ]; then
              mkdir -p "$(dirname "$ASC_KEY_PATH")"
              printf '%s' "$ASC_PRIVATE_KEY" > "$ASC_KEY_PATH"
              chmod 600 "$ASC_KEY_PATH"
            else
              echo "::error::no ASC_PRIVATE_KEY and no local file at $ASC_KEY_PATH"; exit 1
            fi
          fi

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN" >/dev/null 2>&1 || true

      - name: Regenerate Xcode project (if xcodegen)
        run: |
          if [ -f "project.yml" ] && command -v xcodegen >/dev/null 2>&1; then
            xcodegen generate 2>&1 | tail -20
          else
            echo "no xcodegen needed"
          fi

      - name: Install Ruby deps
        run: |
          export PATH="${RBENV_RUBY}/bin:$PATH"
          which ruby && ruby --version
          ${RBENV_RUBY}/bin/bundle --version || ${RBENV_RUBY}/bin/gem install bundler
          ${RBENV_RUBY}/bin/bundle config set --local path 'vendor/bundle'
          ${RBENV_RUBY}/bin/bundle install --jobs 4 --retry 3 2>&1 | tail -20

      - name: Resolve SPM
        run: |
          xcodebuild -project ${SCHEME}.xcodeproj -scheme ${SCHEME} \
            -resolvePackageDependencies 2>&1 | tail -5

      - name: Run IAP capacity UITests (slim matrix)
        id: uitests
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8_FILEPATH: ${{ env.ASC_KEY_PATH }}
          FASTLANE_HIDE_CHANGELOG: 1
          FASTLANE_SKIP_UPDATE_CHECK: 1
          FASTLANE_DISABLE_COLORS: 1
        run: |
          set -o pipefail
          export PATH="${RBENV_RUBY}/bin:$PATH"
          SCREENSHOTS_DIR="fastlane/screenshots/IAP"
          rm -rf "$SCREENSHOTS_DIR"
          mkdir -p "$SCREENSHOTS_DIR"

          # Run only capacity tier tests (frames 08-13)
          TEST_METHODS=(
            "VaultyxScreenshotTests/testCaptureCapacity100gbMonthly"
            "VaultyxScreenshotTests/testCaptureCapacity100gbYearly"
            "VaultyxScreenshotTests/testCaptureCapacity1tbMonthly"
            "VaultyxScreenshotTests/testCaptureCapacity1tbYearly"
            "VaultyxScreenshotTests/testCaptureCapacity5tbMonthly"
            "VaultyxScreenshotTests/testCaptureCapacity5tbYearly"
          )

          TEST_FILTER=""
          for method in "${TEST_METHODS[@]}"; do
            TEST_FILTER="${TEST_FILTER} -only-testing=${method}"
          done

          xcodebuild test \
            -project "${SCHEME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -destination "${SIMULATOR_DESTINATION}" \
            -derivedDataPath /tmp/xcodebuild \
            ${TEST_FILTER} \
            2>&1 | tee /tmp/uitest.log | tail -80

          echo "test_exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          echo "shot_count=$(find "$SCREENSHOTS_DIR" -name '*.png' 2>/dev/null | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Rename IAP screenshots per shot-map
        if: success()
        run: |
          cd "fastlane/screenshots/IAP"
          # Map frame numbers to SKU product IDs
          [ -f "08-capacity-100gb.monthly.png" ] && mv "08-capacity-100gb.monthly.png" "100gb-monthly.png"
          [ -f "09-capacity-100gb.yearly.png" ] && mv "09-capacity-100gb.yearly.png" "100gb-yearly.png"
          [ -f "10-capacity-1tb.monthly.png" ] && mv "10-capacity-1tb.monthly.png" "1tb-monthly.png"
          [ -f "11-capacity-1tb.yearly.png" ] && mv "11-capacity-1tb.yearly.png" "1tb-yearly.png"
          [ -f "12-capacity-5tb.monthly.png" ] && mv "12-capacity-5tb.monthly.png" "5tb-monthly.png"
          [ -f "13-capacity-5tb.yearly.png" ] && mv "13-capacity-5tb.yearly.png" "5tb-yearly.png"
          ls -la

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iap-review-frames-${{ github.run_number }}
          path: fastlane/screenshots/IAP/
          retention-days: 14

      - name: SSH setup (auth to artemis)
        if: ${{ github.event.inputs.dry_run != 'true' && success() }}
        env:
          GITHUB_SSH_KEY: ${{ secrets.GITHUB_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$GITHUB_SSH_KEY" > ~/.ssh/github_deploy_key
          chmod 600 ~/.ssh/github_deploy_key
          ssh-keyscan -H 100.64.0.1 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload IAP screenshots to ASC via artemis
        if: ${{ github.event.inputs.dry_run != 'true' && success() }}
        env:
          SSH_KEY_PATH: ~/.ssh/github_deploy_key
        run: |
          set -eo pipefail
          cd "fastlane/screenshots/IAP"

          # Create temp tarball for efficient transfer
          SHOTS_TAR="/tmp/iap-shots-${{ github.run_id }}.tar.gz"
          tar -czf "$SHOTS_TAR" *.png

          # SCP to artemis
          scp -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no \
            "$SHOTS_TAR" \
            "artemis@100.64.0.1:/tmp/"

          # SSH to artemis and run upload service
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no \
            "artemis@100.64.0.1" \
            bash -c "
              set -eo pipefail
              cd /opt/katafract-platform
              source .venv/bin/activate
              WORK_DIR=\$(mktemp -d)
              cd \$WORK_DIR
              tar -xzf /tmp/iap-shots-*.tar.gz
              ls -la *.png

              # Upload subscription screenshots for capacity tiers
              cd /opt/katafract-platform
              python -m services.asc_screenshot_upload sub \
                --app vaultyx \
                --map 100gb.monthly:\$WORK_DIR/100gb-monthly.png \
                --map 100gb.yearly:\$WORK_DIR/100gb-yearly.png \
                --map 1tb.monthly:\$WORK_DIR/1tb-monthly.png \
                --map 1tb.yearly:\$WORK_DIR/1tb-yearly.png \
                --map 5tb.monthly:\$WORK_DIR/5tb-monthly.png \
                --map 5tb.yearly:\$WORK_DIR/5tb-yearly.png \
                2>&1 | tee /tmp/asc-upload.log | tail -50

              rm -rf \$WORK_DIR /tmp/iap-shots-*.tar.gz
            " 2>&1 | tee /tmp/asc-upload-outer.log | tail -40

      - name: Audit ASC state (verify upload)
        if: ${{ github.event.inputs.check_asc_state == 'true' && success() }}
        env:
          SSH_KEY_PATH: ~/.ssh/github_deploy_key
        run: |
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=no \
            "artemis@100.64.0.1" \
            bash -c "
              set -eo pipefail
              cd /opt/katafract-platform
              source .venv/bin/activate
              echo '=== Auditing ASC state for capacity-tier subscriptions ==='
              python -m services.asc_screenshot_upload audit --app vaultyx 2>&1 | grep -A 20 'Subscriptions:'

              echo ''
              echo '=== Checking for MISSING review screenshots ==='
              OUTPUT=\$(python -m services.asc_screenshot_upload audit --app vaultyx 2>&1)
              if echo \"\$OUTPUT\" | grep -q 'review-shot=MISSING.*100gb'; then
                echo '::warning::Some capacity SKUs still missing review screenshots'
                echo \"\$OUTPUT\" | grep 'review-shot='
              else
                echo '✅ All capacity tier SKUs have review screenshots'
              fi
            " 2>&1 | tail -50

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ IAP review screenshots captured and uploaded"
            exit 0
          else
            echo "❌ IAP review screenshot capture/upload failed"
            exit 1
          fi
