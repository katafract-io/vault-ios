name: PR check (compile gate)

on:
  # No paths filter: the "Compile" context is a REQUIRED check and must report on
  # every PR head SHA (a path-filtered required check jams the PR on unlisted-file
  # commits). Compile is fast/incremental. The security gate (adversarial review) is
  # a SEPARATE base-branch-controlled workflow (adversarial-review.yml via
  # workflow_run) so a PR head cannot edit its own gate.
  pull_request:

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile (iOS device, no signing)
    # NO cancel-in-progress here: this is the REQUIRED check, and a cancelled run of a
    # required context makes GitHub's rollup treat the whole thing as failed → PR blocked
    # even when a sibling run succeeded. Let both push+PR runs complete (cheap compile).
    runs-on: [self-hosted, macOS, ios-build]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read repo-meta.yml
        id: meta
        run: |
          set -euo pipefail
          if [ ! -f .github/repo-meta.yml ]; then
            echo "::error::.github/repo-meta.yml missing — required by verification framework"
            exit 1
          fi
          SCHEME=$(awk -F': *' '/^scheme:/ {print $2; exit}' .github/repo-meta.yml | tr -d '"' | tr -d "'")
          PROJECT=$(awk -F': *' '/^project:/ {print $2; exit}' .github/repo-meta.yml | tr -d '"' | tr -d "'")
          if [ -z "$SCHEME" ] || [ -z "$PROJECT" ]; then
            echo "::error::repo-meta.yml must define both scheme and project"
            cat .github/repo-meta.yml
            exit 1
          fi
          echo "scheme=$SCHEME"   >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "✅ scheme=$SCHEME project=$PROJECT"

      - name: Regenerate Xcode project (xcodegen if present)
        run: |
          XCODEGEN_BIN=$(command -v xcodegen 2>/dev/null || echo /usr/local/bin/xcodegen)
          if [ -f project.yml ] && [ -x "$XCODEGEN_BIN" ]; then
            "$XCODEGEN_BIN" generate 2>&1 | tail -10
          else
            echo "no xcodegen / no project.yml — skipping regen"
          fi

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -scheme "${{ steps.meta.outputs.scheme }}" \
                     -project "${{ steps.meta.outputs.project }}" \
                     -derivedDataPath "${{ runner.temp }}/dd-${{ github.run_id }}-${{ github.run_attempt }}" \
                     -resolvePackageDependencies 2>&1 | tail -10

      - name: Compile (Debug, device, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "${{ steps.meta.outputs.scheme }}" \
            -project "${{ steps.meta.outputs.project }}" \
            -derivedDataPath "${{ runner.temp }}/dd-${{ github.run_id }}-${{ github.run_attempt }}" \
            -destination "generic/platform=iOS" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | grep -E ": (error|warning):" | head -100
